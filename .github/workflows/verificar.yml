name: Verificação automática do sistema

on:
  schedule:
    # Todo dia às 09:00 Brasília (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  verificar:
    runs-on: ubuntu-latest
    permissions:
      issues: write   # para abrir issues automaticamente se encontrar erro
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q requests
      - run: python scripts/verificar_sistema.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
