<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa em Dia</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Casa em Dia" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#dc6b4f" />
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="js/app.js"></script>
<style>
  body { font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; }
  [x-cloak] { display: none !important; }
</style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-rose-50 min-h-screen" x-data="appState">

  <!-- LOADING -->
  <div x-show="view === 'loading'" class="flex items-center justify-center min-h-screen text-gray-400">
    Carregando...
  </div>

  <!-- LOGIN / CADASTRO -->
  <div x-show="view === 'login'" x-cloak class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="w-16 h-16 mx-auto mb-3 rounded-2xl bg-gradient-to-br from-orange-400 to-rose-400 flex items-center justify-center text-white text-2xl">❤</div>
        <h1 class="text-2xl font-bold">Casa em Dia</h1>
        <p class="text-gray-500 text-sm">Controle financeiro e calendário do casal.</p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-6">
        <div x-show="!emailLocked" class="flex bg-gray-100 rounded-full p-1 mb-5">
          <button @click="authMode='entrar'" :class="authMode==='entrar' ? 'bg-white shadow text-gray-900' : 'text-gray-500'" class="flex-1 rounded-full py-2 text-sm font-medium transition">Entrar</button>
          <button @click="authMode='criar'" :class="authMode==='criar' ? 'bg-white shadow text-gray-900' : 'text-gray-500'" class="flex-1 rounded-full py-2 text-sm font-medium transition">Criar conta</button>
        </div>

        <div x-show="emailLocked" class="flex items-center justify-between mb-5 bg-gray-50 rounded-xl px-3 py-2">
          <div class="min-w-0">
            <p class="text-xs text-gray-400">Entrando como</p>
            <p class="text-sm font-medium truncate" x-text="email"></p>
          </div>
          <button type="button" @click="trocarDeConta" class="text-xs text-rose-600 font-medium shrink-0 ml-2">Trocar de conta</button>
        </div>

        <form @submit.prevent="submitAuth" autocomplete="on">
          <template x-if="!emailLocked">
            <div>
              <label class="block text-sm mb-1">E-mail</label>
              <input type="email" name="email" autocomplete="username" x-model="email" required class="w-full mb-4 rounded-xl text-base border border-gray-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-rose-300" />
            </div>
          </template>

          <label class="block text-sm mb-1">Senha</label>
          <div class="relative mb-4">
            <input
              :type="showPassword ? 'text' : 'password'"
              name="password"
              :autocomplete="authMode === 'entrar' ? 'current-password' : 'new-password'"
              x-model="password" required minlength="6"
              class="w-full rounded-xl border border-gray-200 px-3 py-2 pr-10 text-base focus:outline-none focus:ring-2 focus:ring-rose-300" />
            <button type="button" @click="togglePassword" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600" :aria-label="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
              <svg x-show="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg x-show="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a18.5 18.5 0 014.22-5.06M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 7 11 7a18.5 18.5 0 01-2.16 3.19M14.12 14.12a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>

          <p x-show="authError" x-text="authError" class="text-sm text-red-600 mb-3"></p>

          <button type="submit" :disabled="authLoading" class="w-full bg-rose-500 hover:bg-rose-600 disabled:opacity-60 text-white rounded-xl py-2.5 font-medium transition">
            <span x-show="!authLoading" x-text="authMode==='entrar' ? 'Entrar' : 'Criar conta'"></span>
            <span x-show="authLoading">Aguarde...</span>
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-gray-400 mt-4">Nunca pedimos senha do seu banco. Importação é só por arquivo CSV/OFX.</p>
    </div>
  </div>

  <!-- APP -->
  <!-- TELA DE BLOQUEIO: sessão já restaurada, esperando Face ID/digital -->
  <div x-show="view === 'app' && bloqueado" x-cloak class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm bg-white rounded-2xl shadow-sm p-6 text-center">
      <div class="w-14 h-14 rounded-full flex items-center justify-center text-white font-bold mx-auto mb-3" :style="'background-color: ' + (profile?.color || '#7c3aed')" x-text="(profile?.display_name || 'C').charAt(0).toUpperCase()"></div>
      <h1 class="text-base font-semibold mb-1">Casa em Dia bloqueado</h1>
      <p class="text-xs text-gray-500 mb-5">Confirme com Face ID, digital ou a tela de desbloqueio do aparelho pra continuar.</p>
      <button @click="desbloquear" class="w-full bg-rose-500 hover:bg-rose-600 text-white rounded-xl py-3 text-sm font-medium">🔓 Desbloquear</button>
      <p x-show="biometriaErro" class="text-xs text-red-600 mt-3" x-text="biometriaErro"></p>
      <button @click="logout" class="text-xs text-gray-400 underline mt-4">Sair da conta</button>
    </div>
  </div>

  <div x-show="view === 'app' && !bloqueado" x-cloak class="max-w-5xl mx-auto p-3 sm:p-4 pb-16">
    <header class="flex flex-wrap items-center justify-between gap-2 py-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shrink-0" :style="'background-color: ' + (profile?.color || '#7c3aed')" x-text="(profile?.display_name || 'C').charAt(0).toUpperCase()"></div>
        <div>
          <h1 class="text-lg font-bold leading-tight">Casa em Dia</h1>
          <p class="text-xs text-gray-500" x-text="profile ? (profile.display_name + (isAdmin ? ' (admin)' : '')) : ''"></p>
        </div>
      </div>
    </header>

    <div class="flex bg-gray-100 rounded-full p-1 mb-5 max-w-lg">
      <button @click="abaAtual='painel'" :class="abaAtual==='painel' ? 'bg-white shadow text-gray-900' : 'text-gray-500'" class="flex-1 rounded-full py-2 text-sm font-medium transition">Painel</button>
      <button @click="abaAtual='financeiro'" :class="abaAtual==='financeiro' ? 'bg-white shadow text-gray-900' : 'text-gray-500'" class="flex-1 rounded-full py-2 text-sm font-medium transition">Financeiro</button>
      <button @click="abaAtual='calendario'; abrirCalendario()" :class="abaAtual==='calendario' ? 'bg-white shadow text-gray-900' : 'text-gray-500'" class="flex-1 rounded-full py-2 text-sm font-medium transition">Calendário</button>
      <button @click="abaAtual='ajustes'" :class="abaAtual==='ajustes' ? 'bg-white shadow text-gray-900' : 'text-gray-500'" class="flex-1 rounded-full py-2 text-sm font-medium transition">Ajustes</button>
    </div>

    <!-- PAINEL DE TAREFAS (dashboard pessoal) -->
    <template x-if="!loadingData && abaAtual === 'painel'">
      <div class="grid gap-4" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
        <section class="bg-white rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-gray-700 mb-3">📌 Tarefas de hoje</h2>
          <div class="divide-y">
            <template x-for="(t, i) in tarefasDeHoje" :key="i">
              <div class="flex items-center justify-between gap-2 py-2.5">
                <p class="font-medium truncate" x-text="t.titulo"></p>
                <span class="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 uppercase shrink-0" x-text="t.tipo"></span>
              </div>
            </template>
            <p x-show="tarefasDeHoje.length === 0" class="text-xs text-gray-400 py-1">Nada marcado pra hoje. 🎉</p>
          </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-gray-700 mb-3">🛠️ Trabalhos em aberto</h2>
          <div class="divide-y max-h-80 overflow-y-auto">
            <template x-for="(t, i) in trabalhosEmAberto" :key="i">
              <div class="flex items-center justify-between gap-2 py-2.5">
                <div class="min-w-0">
                  <p class="font-medium truncate" x-text="t.titulo"></p>
                  <p class="text-xs text-gray-400" x-text="t.prazo ? 'Prazo ' + fmtData(t.prazo) : 'Sem prazo definido'"></p>
                </div>
                <span class="text-[10px] px-2 py-0.5 rounded-full uppercase shrink-0" :class="t.origem === 'sistema_joias' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'" x-text="t.origem === 'sistema_joias' ? 'joia' : 'agenda'"></span>
              </div>
            </template>
            <p x-show="trabalhosEmAberto.length === 0" class="text-xs text-gray-400 py-1">Nenhum trabalho em aberto. 🎉</p>
          </div>
        </section>

        <section class="rounded-2xl shadow-sm p-4" :class="(conflitoHoje || temConflitoFinanceiro(hojeISO())) ? 'bg-red-50' : 'bg-white'">
          <h2 class="text-sm font-semibold mb-1" :class="(conflitoHoje || temConflitoFinanceiro(hojeISO())) ? 'text-red-700' : 'text-gray-700'">⚠️ Conflito de agenda hoje</h2>
          <p class="text-sm" :class="(conflitoHoje || temConflitoFinanceiro(hojeISO())) ? 'text-red-700 font-medium' : 'text-gray-400'" x-text="conflitoHoje && temConflitoFinanceiro(hojeISO()) ? 'Compromissos sobrepostos e mais de uma conta vencendo hoje — revise no calendário.' : conflitoHoje ? 'Você tem compromissos com horário sobreposto hoje — revise no calendário.' : temConflitoFinanceiro(hojeISO()) ? 'Mais de uma conta/fatura vence hoje — revise no calendário.' : 'Nenhum conflito hoje.'"></p>
        </section>

        <section class="bg-amber-50 rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-amber-700 mb-1">⏳ Pendente nesse mês (financeiro)</h2>
          <p class="text-lg font-semibold text-amber-800" x-text="fmtMoeda(pendenteEmContas.total)"></p>
          <p class="text-xs text-amber-600" x-text="pendenteEmContas.quantidade + ' conta(s)'"></p>
        </section>

        <section class="bg-white rounded-2xl shadow-sm p-4" style="grid-column: 1 / -1;">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold text-gray-700">📅 Agenda da semana</h2>
            <span x-show="conflitosNaSemana > 0" class="text-[10px] px-2 py-0.5 rounded-full bg-red-100 text-red-700 uppercase" x-text="conflitosNaSemana + ' dia(s) com conflito'"></span>
          </div>
          <div class="grid gap-2" style="grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));">
            <template x-for="d in agendaDaSemana" :key="d.data">
              <button @click="selecionarDia(d.data)" class="text-left rounded-xl p-2.5 border" :class="(d.conflitoAgenda || d.conflitoFinanceiro) ? 'border-red-200 bg-red-50' : 'border-gray-100 bg-gray-50'">
                <p class="text-xs font-semibold" :class="(d.conflitoAgenda || d.conflitoFinanceiro) ? 'text-red-700' : 'text-gray-700'" x-text="ehHoje(d.data) ? 'Hoje' : fmtData(d.data)"></p>
                <p class="text-[11px] text-gray-500 mt-1" x-text="d.eventos.length + ' compromisso(s)'"></p>
                <p class="text-[11px]" :class="d.contas.length ? 'text-red-600' : 'text-gray-400'" x-text="d.contas.length ? d.contas.length + ' conta(s) vencendo' : 'sem contas vencendo'"></p>
                <p class="text-[10px] text-red-600 font-medium mt-1" x-show="d.conflitoAgenda || d.conflitoFinanceiro">⚠️ conflito</p>
              </button>
            </template>
          </div>
        </section>
      </div>
    </template>

    <div x-show="loadingData" class="text-center text-gray-400 py-10">Carregando dados...</div>

    <template x-if="!loadingData && abaAtual === 'financeiro'">
      <div>
        <!-- SELETOR DE MÊS (vale pra tudo, exceto transferências que é histórico completo) -->
        <div class="flex items-center justify-between mb-4 bg-white rounded-2xl shadow-sm px-2 py-2">
          <button @click="mesFinanceiroAnterior" class="px-3 py-1 rounded-full border border-gray-200 text-sm">‹</button>
          <p class="font-semibold" x-text="nomeMesFinanceiro"></p>
          <button @click="mesFinanceiroSeguinte" class="px-3 py-1 rounded-full border border-gray-200 text-sm">›</button>
        </div>


        <!-- SUB-ABAS -->
        <div class="flex gap-1 mb-5 overflow-x-auto pb-1 -mx-1 px-1">
          <button @click="abaFinanceiro='resumo'" :class="abaFinanceiro==='resumo' ? 'bg-white shadow text-gray-900' : 'text-gray-500 hover:bg-white/60'" class="rounded-full px-4 py-1.5 text-sm font-medium transition whitespace-nowrap shrink-0">Resumo</button>
          <button @click="abaFinanceiro='contas_fixas'" :class="abaFinanceiro==='contas_fixas' ? 'bg-white shadow text-gray-900' : 'text-gray-500 hover:bg-white/60'" class="rounded-full px-4 py-1.5 text-sm font-medium transition whitespace-nowrap shrink-0">Compromissos fixos</button>
          <button @click="abaFinanceiro='parceladas'" :class="abaFinanceiro==='parceladas' ? 'bg-white shadow text-gray-900' : 'text-gray-500 hover:bg-white/60'" class="rounded-full px-4 py-1.5 text-sm font-medium transition whitespace-nowrap shrink-0">Parceladas</button>
        </div>

        <!-- RESUMO -->
        <template x-if="abaFinanceiro === 'resumo'">
          <div class="grid gap-4" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
            <section class="bg-white rounded-2xl shadow-sm p-4">
              <h2 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-1.5">⚠️ Contas pendentes nesse mês</h2>
              <div class="divide-y">
                <template x-for="p in billPaymentsDoMes.filter(p => p.status === 'pendente')" :key="p.id">
                  <div class="flex items-center justify-between gap-2 py-2.5">
                    <div class="min-w-0">
                      <p class="font-medium truncate" x-text="billName(p.fixed_bill_id)"></p>
                      <p class="text-xs text-gray-400" x-text="'Vence ' + fmtData(p.due_date)"></p>
                    </div>
                    <p class="font-medium shrink-0" x-text="fmtMoeda(p.amount)"></p>
                  </div>
                </template>
                <p x-show="billPaymentsDoMes.filter(p => p.status === 'pendente').length === 0" class="text-xs text-gray-400 py-1">Nenhuma conta pendente nesse mês. 🎉</p>
              </div>
            </section>
            <section class="bg-white rounded-2xl shadow-sm p-4">
              <h2 class="text-sm font-semibold text-gray-700 mb-1">📑 Gastos variáveis recentes</h2>
              <p class="text-xs text-gray-400 mb-3">Cartão, variáveis e lançamentos avulsos · <span x-text="nomeMesFinanceiro"></span></p>
              <div class="divide-y">
                <template x-for="t in transactions.filter(t => t.date.slice(0,7) === mesFinanceiro && !t.transferencia_interna && t.kind !== 'renda').slice(0, 8)" :key="t.id">
                  <div class="flex items-center justify-between gap-2 py-2.5">
                    <div class="min-w-0">
                      <p class="font-medium truncate" x-text="t.description"></p>
                      <p class="text-xs text-gray-400" x-text="fmtData(t.date) + (t.account ? ' · ' + t.account : '')"></p>
                    </div>
                    <p class="font-medium shrink-0" x-text="fmtMoeda(t.amount)"></p>
                  </div>
                </template>
                <p x-show="transactions.filter(t => t.date.slice(0,7) === mesFinanceiro && !t.transferencia_interna && t.kind !== 'renda').length === 0" class="text-xs text-gray-400 py-1">Nenhum lançamento variável nesse mês.</p>
              </div>
            </section>
          </div>
        </template>

        <!-- CONTAS FIXAS -->
        <template x-if="abaFinanceiro === 'contas_fixas'">
          <section class="bg-white rounded-2xl shadow-sm p-4">
            <div class="flex items-center justify-between mb-1 gap-2 flex-wrap">
              <h2 class="text-sm font-semibold text-gray-700">📄 Contas fixas</h2>
              <div class="flex items-center gap-2 flex-wrap justify-end">
                <select x-model="alvoImportacaoFixos" class="rounded-lg border border-gray-200 px-2 py-1.5 text-xs max-w-[55%]">
                  <option value="">Atualizar valor de…</option>
                  <template x-for="c in cartoes" :key="'c'+c.id"><option :value="'cartao:'+c.id" x-text="'💳 ' + c.nome"></option></template>
                  <template x-for="b in fixedBills.filter(b => b.active !== false)" :key="'b'+b.id"><option :value="'conta:'+b.id" x-text="'📄 ' + b.name"></option></template>
                </select>
                <input type="file" accept=".csv,.txt,.pdf,application/pdf" class="hidden" x-ref="inputValorFixos" @change="importarValorFixos($event)" />
                <button @click="abrirImportarValorFixos" :disabled="!alvoImportacaoFixos || processandoArquivo" class="text-xs px-3 py-1.5 rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50 disabled:opacity-40" x-text="processandoArquivo ? '⏳ Lendo…' : '📥 Importar CSV/PDF'"></button>
                <button @click="abrirNovaContaFixa" class="bg-rose-500 hover:bg-rose-600 text-white rounded-full px-3 py-1.5 text-xs font-medium">+ Nova</button>
              </div>
            </div>
            <p class="text-xs text-gray-500 mb-2">Pra atualizar um valor pela fatura/extrato: escolha o <b>cartão</b> ou a <b>conta</b> no seletor acima e suba o CSV/PDF do banco. O app lê o total e grava nesse item, no mês selecionado. Pode subir a mesma fatura várias vezes — ele só regrava, sem duplicar.</p>
            <p class="text-sm font-semibold text-gray-800 mb-3" x-text="'Total do mês (contas fixas + cartões): ' + fmtMoeda(totalContasFixasDoMes + totalFaturasCartaoDoMes)"></p>
            <div x-show="resultadoImportacaoValor" class="text-xs bg-green-50 rounded-lg px-3 py-2 mb-3 space-y-1">
              <p class="text-green-800" x-text="resultadoImportacaoValor ? ('✅ ' + resultadoImportacaoValor.nome + ': valor de ' + resultadoImportacaoValor.nomeCompetencia + ' atualizado para ' + fmtMoeda(resultadoImportacaoValor.valor) + (resultadoImportacaoValor.valorAnterior ? ' (antes: ' + fmtMoeda(resultadoImportacaoValor.valorAnterior) + ')' : '') + ' — ' + resultadoImportacaoValor.origem + '.') : ''"></p>
              <p x-show="resultadoImportacaoValor && resultadoImportacaoValor.competencia !== mesFinanceiro" class="text-amber-700" x-text="resultadoImportacaoValor ? ('ℹ️ Entrou na competência ' + resultadoImportacaoValor.nomeCompetencia + ' (lida do documento), não no mês que você está vendo. Navegue até lá com ‹ ›.') : ''"></p>
              <p x-show="resultadoImportacaoValor && resultadoImportacaoValor.parcelasDetectadas > 0" class="text-indigo-700" x-text="resultadoImportacaoValor ? ('🧾 ' + resultadoImportacaoValor.parcelasDetectadas + ' compra(s) parcelada(s) na aba Parceladas' + (resultadoImportacaoValor.parcelasNovas ? ' · ' + resultadoImportacaoValor.parcelasNovas + ' nova(s)' : '') + (resultadoImportacaoValor.parcelasAtualizadas ? ' · ' + resultadoImportacaoValor.parcelasAtualizadas + ' atualizada(s)' : '') + '. Confira e apague as que não fizerem sentido.') : ''"></p>
            </div>
            <div class="divide-y">
              <template x-for="p in billPaymentsDoMes" :key="p.id">
                <div class="flex items-center justify-between gap-2 py-3 flex-wrap">
                  <div class="min-w-0">
                    <p class="font-medium flex items-center gap-2 flex-wrap">
                      <span x-text="billName(p.fixed_bill_id)"></span>
                      <span class="text-[10px] px-2 py-0.5 rounded-full uppercase" :class="statusBadgeClass(p.status)" x-text="p.status"></span>
                    </p>
                    <p class="text-xs text-gray-400" x-text="'Vence ' + fmtData(p.due_date) + ' · ' + fmtMoeda(p.amount)"></p>
                    <p x-show="p.status === 'pago' && p.paid_at" class="text-xs text-green-600 font-medium" x-text="'✓ Pago em ' + fmtData(p.paid_at.slice(0,10))"></p>
                  </div>
                  <div class="flex items-center gap-2 shrink-0">
                    <button @click="marcarPago(p)" class="text-xs px-3 py-1.5 rounded-full border" :class="p.status === 'pago' ? 'border-gray-200 text-gray-500' : 'border-green-200 text-green-700 hover:bg-green-50'" x-text="p.status === 'pago' ? '✕ Desmarcar' : '✓ Pagar'"></button>
                    <button @click="abrirEditarContaFixa(fixedBills.find(b => b.id === p.fixed_bill_id))" aria-label="Editar conta fixa" class="text-gray-300 hover:text-gray-600 p-1" title="Editar nome/valor/vencimento">✎</button>
                    <button @click="abrirEditarPagamento(p)" aria-label="Editar pagamento deste mês" class="text-gray-300 hover:text-gray-600 p-1" title="Editar só este mês">📅</button>
                    <button @click="excluirContaFixa(p.fixed_bill_id)" aria-label="Excluir conta fixa" class="text-gray-300 hover:text-red-500 p-1">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a2 2 0 012-2h0a2 2 0 012 2v2"/></svg>
                    </button>
                  </div>
                </div>

        <div class="grid gap-3 mb-6" style="grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));">
          <div class="rounded-2xl p-3 bg-white shadow-sm">
            <p class="text-xs text-gray-500 mb-1">Prazos abertos</p>
            <p class="text-lg font-semibold" x-text="prazosAbertos"></p>
          </div>
          <div class="rounded-2xl p-3 bg-white shadow-sm">
            <p class="text-xs text-gray-500 mb-1">Prazos concluídos</p>
            <p class="text-lg font-semibold" x-text="prazosConcluidos"></p>
          </div>
          <div class="rounded-2xl p-3 bg-red-50 shadow-sm">
            <p class="text-xs text-red-600 mb-1">Conflitos no ano</p>
            <p class="text-lg font-semibold text-red-700" x-text="conflitosNoAno"></p>
          </div>
          <div x-show="isAdmin" class="rounded-2xl p-3 bg-white shadow-sm flex items-center justify-center">
            <button @click="abrirImportarPrazos" class="text-xs text-rose-600 font-medium">Importar prazos (JSON)</button>
          </div>
        </div>

        <div class="flex items-center justify-between mb-4">
          <button @click="anoAnterior" class="px-3 py-1 rounded-full border border-gray-200 text-sm">‹</button>
          <p class="font-semibold text-lg" x-text="anoCalendario"></p>
          <button @click="anoSeguinte" class="px-3 py-1 rounded-full border border-gray-200 text-sm">›</button>
        </div>

        <!-- CICLO MENSTRUAL (só visível pra quem registra, não-admin) -->
        <div x-show="!isAdmin" class="bg-white rounded-2xl shadow-sm p-4 mb-6">
          <div class="flex items-center justify-between mb-2">
            <p class="text-sm font-semibold text-gray-700">Ciclo</p>
            <button @click="abrirEditarDuracaoCiclo" class="text-xs text-rose-600 font-medium">Ajustar duração média do ciclo</button>
          </div>
          <template x-if="cicloInfo">
            <div>
              <p class="text-sm mb-1">Dia <span x-text="cicloInfo.diaDoCiclo"></span> do ciclo (<span x-text="cicloInfo.duracaoCiclo"></span> dias<span x-show="cicloInfo.baseadoEmHistorico"> · calculado pelo seu histórico</span>) · <span class="font-medium" x-text="cicloInfo.fase"></span></p>
              <p class="text-xs text-gray-500">Período fértil provável: <span x-text="fmtData(cicloInfo.fertilInicio)"></span> a <span x-text="fmtData(cicloInfo.fertilFim)"></span></p>
              <p class="text-xs text-gray-500">Ovulação provável: <span x-text="fmtData(cicloInfo.ovulacao)"></span></p>
              <p class="text-xs text-gray-500">Próxima menstruação: por volta de <span x-text="fmtData(cicloInfo.proximaMenstruacao)"></span></p>
            </div>
          </template>
          <p x-show="!cicloInfo" class="text-xs text-gray-400">Nenhum dia de menstruação marcado ainda. Toque num dia no calendário abaixo e marque "Dia de menstruação".</p>
        </div>

        <!-- MODAL: ajustar duração média do ciclo (usado até termos histórico suficiente, 2+ ciclos marcados) -->
        <div x-show="editandoDuracaoCiclo" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" @click.self="editandoDuracaoCiclo = false">
          <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-5">
            <div class="flex items-center justify-between mb-3">
              <p class="font-semibold">Duração média do ciclo</p>
              <button @click="editandoDuracaoCiclo = false" class="text-gray-400">✕</button>
            </div>
            <form @submit.prevent="salvarDuracaoCiclo" class="space-y-2">
              <p class="text-xs text-gray-500">Usada só pra estimativas enquanto você não tem 2 ciclos marcados ainda — depois disso o app calcula sozinho pelo seu histórico.</p>
              <input type="number" min="15" max="45" x-model="formDuracaoCiclo" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm" />
              <button type="submit" class="w-full bg-rose-500 hover:bg-rose-600 text-white rounded-xl py-2 text-sm font-medium mt-2">Salvar</button>
            </form>
          </div>
        </div>

        <div class="flex flex-wrap gap-4 text-xs mb-4">
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-violet-500 inline-block"></span>Meu compromisso</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-blue-500 inline-block"></span>Compromisso conjunto</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-orange-500 inline-block"></span>Trabalho</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-gray-400 inline-block"></span>Feriado</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span>Prazo do Sistema de Joias</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-red-600 inline-block"></span>Conta/fatura vencendo</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>Conta/fatura paga</span>
          <span class="flex items-center gap-1">🌕 Lua cheia/nova</span>
          <template x-if="!isAdmin">
            <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-pink-500 inline-block"></span>Menstruação</span>
          </template>
          <template x-if="!isAdmin">
            <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-teal-400 inline-block"></span>Período fértil/ovulação</span>
          </template>
        </div>

        <div class="grid gap-4" style="grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));">
          <template x-for="(nomeMes, mesIndex) in nomesMeses" :key="mesIndex">
            <div :id="'mes-card-' + mesIndex" class="bg-white rounded-2xl shadow-sm p-3">
              <p class="text-sm font-semibold mb-2" x-text="nomeMes"></p>
              <div class="grid grid-cols-7 gap-0.5 text-[10px] text-gray-400 mb-1">
                <span class="text-center">D</span><span class="text-center">S</span><span class="text-center">T</span><span class="text-center">Q</span><span class="text-center">Q</span><span class="text-center">S</span><span class="text-center">S</span>
              </div>
              <div class="grid grid-cols-7 gap-0.5">
                <template x-for="(dia, i) in diasDoMes(mesIndex)" :key="mesIndex + '-' + i">
                  <button
                    @click="selecionarDia(dia)"
                    :disabled="!dia"
                    class="aspect-square text-[10px] rounded-md flex flex-col items-center justify-center relative"
                    :class="[
                      !dia ? 'invisible' : (diaSelecionado === dia ? 'bg-rose-500 text-white' : (temConflito(dia) || temConflitoFinanceiro(dia)) ? 'bg-red-100' : (!isAdmin && faseCicloDoDia(dia) === 'menstrual') ? 'bg-pink-100' : (!isAdmin && (faseCicloDoDia(dia) === 'fertil' || faseCicloDoDia(dia) === 'ovulacao')) ? 'bg-teal-50' : feriadoDoDia(dia) ? 'bg-gray-100' : 'hover:bg-gray-50'),
                      dia && ehHoje(dia) && diaSelecionado !== dia ? 'ring-2 ring-rose-400' : '',
                    ]"
                  >
                    <span class="flex items-center gap-0.5">
                      <span x-text="dia ? parseInt(dia.slice(8,10)) : ''"></span>
                      <template x-if="dia && luaMarcanteDoDia(dia)"><span x-text="luaDoDia(dia).emoji"></span></template>
                    </span>
                    <span class="flex gap-0.5 mt-0.5">
                      <template x-if="dia && eventosDoDia(dia).some(e => e.owner_id === uid && !e.conjunto)"><span class="w-1 h-1 rounded-full bg-violet-500"></span></template>
                      <template x-if="dia && eventosDoDia(dia).some(e => e.conjunto)"><span class="w-1 h-1 rounded-full bg-blue-500"></span></template>
                      <template x-if="dia && eventosDoDia(dia).some(e => e.tipo === 'trabalho')"><span class="w-1 h-1 rounded-full bg-orange-500"></span></template>
                      <template x-if="dia && feriadoDoDia(dia)"><span class="w-1 h-1 rounded-full bg-gray-400"></span></template>
                      <template x-if="dia && tarefasJoiasDoDia(dia).length > 0"><span class="w-1 h-1 rounded-full bg-amber-500"></span></template>
                      <template x-if="dia && contasPendentesDoDia(dia).length > 0"><span class="w-1 h-1 rounded-full bg-red-600"></span></template>
                      <template x-if="dia && contasDoDia(dia).some(c => c.pago)"><span class="w-1 h-1 rounded-full bg-green-500"></span></template>
                      <template x-if="dia && !isAdmin && faseCicloDoDia(dia) === 'menstrual'"><span class="w-1 h-1 rounded-full bg-pink-500"></span></template>
                      <template x-if="dia && !isAdmin && (faseCicloDoDia(dia) === 'fertil' || faseCicloDoDia(dia) === 'ovulacao')"><span class="w-1 h-1 rounded-full bg-teal-400"></span></template>
                    </span>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- PAINEL DO DIA SELECIONADO -->
        <div x-show="diaSelecionado" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" @click.self="diaSelecionado = null">
          <div class="bg-white rounded-2xl shadow-lg w-full max-w-md max-h-[85vh] overflow-y-auto p-5">
            <div class="flex items-center justify-between mb-3">
              <p class="font-semibold flex items-center gap-2">
                <span x-text="diaSelecionado ? fmtData(diaSelecionado) : ''"></span>
                <span x-show="diaSelecionado && ehHoje(diaSelecionado)" class="text-[10px] bg-rose-100 text-rose-600 rounded-full px-2 py-0.5">Hoje</span>
              </p>
              <button @click="diaSelecionado = null" class="text-gray-400">✕</button>
            </div>
            <p x-show="diaSelecionado && feriadoDoDia(diaSelecionado)" class="text-xs text-gray-500 mb-1" x-text="'Feriado: ' + (diaSelecionado ? feriadoDoDia(diaSelecionado) : '')"></p>
            <p x-show="diaSelecionado" class="text-xs text-gray-500 mb-3" x-text="diaSelecionado ? (luaDoDia(diaSelecionado).emoji + ' ' + luaDoDia(diaSelecionado).nome) : ''"></p>

            <!-- marcação diária de menstruação (privado, só não-admin) -->
            <div x-show="!isAdmin && diaSelecionado" class="rounded-xl border border-pink-100 bg-pink-50/60 px-3 py-2 mb-3">
              <button type="button" @click="marcarDiaMenstruacao(diaSelecionado)" class="text-xs px-3 py-1.5 rounded-full w-full"
                :class="diaSelecionado && diaDeMenstruacao(diaSelecionado) ? 'bg-pink-500 text-white' : 'bg-white border border-pink-200 text-pink-700'">
                🩸 <span x-text="diaSelecionado && diaDeMenstruacao(diaSelecionado) ? 'Dia de menstruação (toque pra desmarcar)' : 'Marcar como dia de menstruação'"></span>
              </button>
            </div>

            <!-- registro íntimo (privado, só não-admin) -->
            <div x-show="!isAdmin && diaSelecionado" class="rounded-xl border border-pink-100 bg-pink-50/60 px-3 py-2 mb-4">
              <p class="text-xs font-medium text-pink-700 mb-2">Vida íntima (privado, só você vê)</p>
              <div class="flex flex-wrap gap-2">
                <button type="button" @click="salvarIntimo(diaSelecionado, true)" class="text-xs px-3 py-1.5 rounded-full"
                  :class="diaSelecionado && intimoDoDia(diaSelecionado)?.preservativo === true ? 'bg-pink-500 text-white' : 'bg-white border border-pink-200 text-pink-700'">
                  Com preservativo
                </button>
                <button type="button" @click="salvarIntimo(diaSelecionado, false)" class="text-xs px-3 py-1.5 rounded-full"
                  :class="diaSelecionado && intimoDoDia(diaSelecionado)?.preservativo === false ? 'bg-pink-500 text-white' : 'bg-white border border-pink-200 text-pink-700'">
                  Sem preservativo
                </button>
                <button type="button" x-show="diaSelecionado && intimoDoDia(diaSelecionado)" @click="excluirIntimo(diaSelecionado)" class="text-xs px-3 py-1.5 rounded-full text-gray-500">
                  Remover registro
                </button>
              </div>
            </div>

            <div class="space-y-2 mb-4">
              <template x-for="ev in (diaSelecionado ? eventosDoDia(diaSelecionado) : [])" :key="ev.id">
                <div class="flex items-center justify-between gap-2 rounded-xl border border-gray-100 px-3 py-2">
                  <div class="min-w-0">
                    <p class="text-sm font-medium truncate" x-text="ev.title"></p>
                    <p class="text-xs text-gray-400" x-text="ev.starts_at.slice(11,16) + '–' + ev.ends_at.slice(11,16) + ' · ' + (ev.tipo === 'pessoal' ? 'Pessoal' : 'Trabalho') + ' · ' + (ev.conjunto ? 'Conjunto' : (ev.owner_id === uid ? 'Só meu' : 'Só dela/dele'))"></p>
                  </div>
                  <div class="flex items-center gap-2 shrink-0" x-show="podeEditar(ev)">
                    <button @click="editarEvento(ev)" class="text-xs text-gray-500">Editar</button>
                    <button @click="excluirEvento(ev)" class="text-xs text-red-500">Excluir</button>
                  </div>
                </div>
              </template>
              <p x-show="diaSelecionado && eventosDoDia(diaSelecionado).length === 0" class="text-xs text-gray-400">Nenhum compromisso neste dia.</p>

              <template x-for="c in (diaSelecionado ? contasDoDia(diaSelecionado) : [])" :key="c.id">
                <div class="flex items-center justify-between gap-2 rounded-xl border px-3 py-2" :class="c.pago ? 'border-green-100 bg-green-50/60' : 'border-red-100 bg-red-50/60'">
                  <p class="text-sm font-medium truncate" :class="c.pago ? 'text-green-700' : 'text-red-700'" x-text="(c.pago ? '✓ ' : '') + c.titulo"></p>
                  <p class="text-sm font-medium shrink-0" :class="c.pago ? 'text-green-700' : 'text-red-700'" x-text="fmtMoeda(c.valor)"></p>
                </div>
              </template>
              <p x-show="diaSelecionado && temConflitoFinanceiro(diaSelecionado)" class="text-xs text-red-600 font-medium">⚠️ Mais de uma conta/fatura vencendo nesse dia.</p>
            </div>

            <form @submit.prevent="salvarEvento" class="border-t border-gray-100 pt-3 space-y-2">
              <p class="text-xs font-medium text-gray-500" x-text="eventoEditando ? 'Editar compromisso' : 'Novo compromisso'"></p>
              <input type="text" placeholder="Título" x-model="formEvento.title" required class="w-full rounded-lg border border-gray-200 px-3 py-2 text-base" />
              <div class="flex gap-2">
                <input type="time" x-model="formEvento.hora_inicio" class="w-1/2 rounded-lg border border-gray-200 px-3 py-2 text-sm" />
                <input type="time" x-model="formEvento.hora_fim" class="w-1/2 rounded-lg border border-gray-200 px-3 py-2 text-sm" />
              </div>
              <select x-model="formEvento.tipo" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm">
                <option value="pessoal">Pessoal</option>
                <option value="trabalho">Trabalho</option>
              </select>
              <select x-show="formEvento.tipo === 'trabalho'" x-model="formEvento.status_trabalho" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm">
                <option value="aberto">Aberto</option>
                <option value="concluido">Concluído</option>
                <option value="atrasado">Atrasado</option>
              </select>
              <label class="flex items-center gap-2 text-sm px-1 py-1">
                <input type="checkbox" x-model="formEvento.conjunto" class="rounded" />
                Compromisso conjunto (os dois vamos / os dois vemos)
              </label>
              <input type="text" placeholder="Local (opcional)" x-model="formEvento.location" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-base" />
              <textarea placeholder="Notas (opcional)" x-model="formEvento.notes" class="w-full rounded-lg border border-gray-200 px-3 py-2 text-base" rows="2"></textarea>
              <button type="submit" class="w-full bg-rose-500 hover:bg-rose-600 text-white rounded-xl py-2 text-sm font-medium">Salvar</button>
            </form>
          </div>
        </div>
      </div>
    </template>

    <!-- AJUSTES -->
    <template x-if="!loadingData && abaAtual === 'ajustes'">
      <div class="space-y-6 max-w-2xl">
        <!-- PERFIL -->
        <section class="bg-white rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-gray-700 mb-3">Seu perfil</h2>
          <form @submit.prevent="salvarPerfil" class="flex flex-wrap items-end gap-3">
            <div class="flex-1 min-w-[160px]">
              <label class="block text-xs text-gray-500 mb-1">Nome de exibição</label>
              <input type="text" x-model="formPerfil.display_name" required class="w-full rounded-lg border border-gray-200 px-3 py-2 text-base" />
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Cor</label>
              <input type="color" x-model="formPerfil.color" class="w-14 h-10 rounded-lg border border-gray-200" />
            </div>
            <button type="submit" class="bg-rose-500 hover:bg-rose-600 text-white rounded-xl px-4 py-2 text-sm font-medium">Salvar</button>
          </form>
          <button @click="logout" class="mt-4 text-sm text-gray-500 hover:text-rose-600">↩ Sair da conta</button>
        </section>

        <!-- NOTIFICAÇÕES -->
        <section class="bg-white rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-gray-700 mb-2">Notificações</h2>
          <p class="text-xs text-gray-500 mb-3">
            Status:
            <span x-show="notificacaoStatus === 'granted'" class="font-medium text-green-700">ativadas</span>
            <span x-show="notificacaoStatus === 'denied'" class="font-medium text-red-600">bloqueadas pelo navegador</span>
            <span x-show="notificacaoStatus === 'default'" class="font-medium text-gray-700">não ativadas ainda</span>
            <span x-show="notificacaoStatus === 'unsupported'" class="font-medium text-gray-700">não suportadas nesse navegador</span>
          </p>
          <button x-show="notificacaoStatus === 'default'" @click="ativarNotificacoes" class="bg-rose-500 hover:bg-rose-600 text-white rounded-xl px-4 py-2 text-sm font-medium">Ativar notificações</button>
          <p x-show="notificacaoStatus === 'denied'" class="text-xs text-gray-400">Pra reativar, mude a permissão de notificações desse site nas configurações do navegador/celular.</p>
          <p x-show="notificacaoStatus === 'unsupported'" class="text-xs text-amber-700 bg-amber-50 rounded-lg px-3 py-2 mt-1">
            Se você abriu esse link de dentro do WhatsApp/Instagram, é por isso — o navegador embutido desses apps não suporta notificação. Copie o link e abra direto no Chrome (ou use o atalho/QR code), depois instale o app pelo menu do Chrome.
          </p>
          <p class="text-xs text-gray-400 mt-3">
            Pra receber notificações fora do app, instale o Casa em Dia na tela inicial do celular (no Android/Chrome: menu → "Instalar aplicativo"; no iPhone/Safari: compartilhar → "Adicionar à Tela de Início").
          </p>
        </section>

        <!-- DESBLOQUEIO POR BIOMETRIA -->
        <section class="bg-white rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-gray-700 mb-2">🔒 Desbloqueio por Face ID / digital</h2>
          <p class="text-xs text-gray-500 mb-3">
            Liga uma trava local nesse aparelho: ao abrir o app, pede Face ID (iPhone) ou impressão digital (Android) antes de mostrar os dados financeiros — sem precisar digitar a senha de novo. Só vale pra esse aparelho.
          </p>
          <p x-show="!biometriaSuportada" class="text-xs text-amber-700 bg-amber-50 rounded-lg px-3 py-2">Esse navegador/dispositivo não suporta esse recurso.</p>
          <template x-if="biometriaSuportada">
            <div>
              <button x-show="!temBiometriaAtiva(uid)" @click="ativarBiometria" class="bg-rose-500 hover:bg-rose-600 text-white rounded-xl px-4 py-2 text-sm font-medium">Ativar Face ID / digital</button>
              <div x-show="temBiometriaAtiva(uid)" class="flex items-center gap-2">
                <span class="text-xs font-medium text-green-700">✓ Ativado nesse aparelho</span>
                <button @click="desativarBiometria" class="text-xs text-gray-400 underline">Desativar</button>
              </div>
              <p x-show="biometriaErro" class="text-xs text-red-600 mt-2" x-text="biometriaErro"></p>
            </div>
          </template>
        </section>

        <!-- SALDO INFORMADO -->
        <section class="bg-white rounded-2xl shadow-sm p-4">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-sm font-semibold text-gray-700">Saldo informado</h2>
          </div>
          <p class="text-xs text-gray-500 mb-3">Histórico de saldo informado manualmente (referência rápida, não é integração bancária).</p>
          <form @submit.prevent="salvarSaldo" class="flex flex-wrap items-end gap-2 mb-3">
            <input type="number" step="0.01" placeholder="Valor (R$)" x-model="formSaldo.amount" required class="flex-1 min-w-[120px] rounded-lg border border-gray-200 px-3 py-2 text-base" />
            <input type="text" placeholder="Nota (opcional)" x-model="formSaldo.notes" class="flex-1 min-w-[140px] rounded-lg border border-gray-200 px-3 py-2 text-base" />
            <button type="submit" class="bg-rose-500 hover:bg-rose-600 text-white rounded-xl px-4 py-2 text-sm font-medium">Informar</button>
          </form>
          <div class="divide-y">
            <template x-for="b in balances.slice(0, 8)" :key="b.id">
              <div class="flex items-center justify-between gap-2 py-2">
                <div class="min-w-0">
                  <p class="text-sm font-medium" x-text="fmtMoeda(b.amount)"></p>
                  <p class="text-xs text-gray-400" x-text="fmtData(b.as_of) + (b.notes ? ' · ' + b.notes : '')"></p>
                </div>
                <button @click="excluirSaldo(b.id)" class="text-xs text-red-500 shrink-0">Excluir</button>
              </div>
            </template>
            <p x-show="balances.length === 0" class="text-xs text-gray-400 py-1">Nenhum saldo informado.</p>
          </div>
        </section>

        <!-- CATEGORIAS -->
        <section class="bg-white rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-gray-700 mb-3">Categorias</h2>
          <form @submit.prevent="salvarCategoria" class="flex flex-wrap items-end gap-2 mb-3">
            <input type="text" placeholder="Nome da categoria" x-model="formCategoria.name" required class="flex-1 min-w-[140px] rounded-lg border border-gray-200 px-3 py-2 text-base" />
            <select x-model="formCategoria.kind" class="rounded-lg border border-gray-200 px-3 py-2 text-sm">
              <option value="variavel">Variável</option>
              <option value="fixa">Fixa</option>
              <option value="diaria">Diária</option>
              <option value="renda">Renda</option>
            </select>
            <input type="color" x-model="formCategoria.color" class="w-12 h-10 rounded-lg border border-gray-200" />
            <button type="submit" class="bg-rose-500 hover:bg-rose-600 text-white rounded-xl px-4 py-2 text-sm font-medium">Nova</button>
          </form>
          <div class="flex flex-wrap gap-2">
            <template x-for="c in categories" :key="c.id">
              <span class="text-xs rounded-full px-3 py-1.5 flex items-center gap-1.5" style="background: color-mix(in srgb, var(--cor) 15%, white);" :style="'--cor: ' + c.color">
                <span class="w-2 h-2 rounded-full" :style="'background-color: ' + c.color"></span>
                <span x-text="c.name"></span>
                <button @click="excluirCategoria(c.id)" class="text-gray-400 hover:text-red-500 ml-1">✕</button>
              </span>
            </template>
          </div>
        </section>

        <!-- BACKUP -->
        <section class="bg-white rounded-2xl shadow-sm p-4">
          <h2 class="text-sm font-semibold text-gray-700 mb-3">Backup</h2>
          <input type="file" accept="application/json" class="hidden" x-ref="inputBackup" @change="importarBackup($event)" />
          <div class="flex flex-wrap gap-2">
            <button @click="exportarBackup" class="text-sm px-3 py-1.5 rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50">Exportar backup</button>
            <button x-show="isAdmin" @click="abrirImportarBackup" class="text-sm px-3 py-1.5 rounded-full border border-gray-200 text-gray-600 hover:bg-gray-50">Importar backup</button>
          </div>
        </section>
      </div>
    </template>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
    }
  </script>
</body>
</html>
